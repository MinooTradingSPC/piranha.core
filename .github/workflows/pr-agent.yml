name: PR-Agent AI Code Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr-agent:
    uses: KiarashMinoo/.github/.github/workflows/reusable-pr-agent.yml@main

    secrets:
      OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
      NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
